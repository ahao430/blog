name: Deploy Hexo

# 在「语雀同步」成功完成后自动构建并发布；也支持手动触发。
# master 上的 README + docs 不受影响；构建产物发布到独立的 gh-pages 分支。
on:
  workflow_run:
    workflows: ['Sync Yuque']
    types: [completed]
  workflow_dispatch:
  push:
    tags:
      - 'deploy-*'

permissions:
  contents: write

concurrency:
  group: deploy-hexo
  cancel-in-progress: false

jobs:
  build-deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prepare posts from docs
        run: node tools/prepare-posts.cjs

      - name: Build site
        run: npx hexo clean && npx hexo generate

      - name: Deploy to gh-pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd public
          git init -q
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b gh-pages
          git add -A
          git commit -q -m "deploy: hexo site"
          git push -f "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages:gh-pages
