name: Sync Yuque

on:
  schedule:
    # 每 6 小时同步一次（17 分，避开整点）
    - cron: '17 */6 * * *'
  workflow_dispatch: # 支持手动触发，首次验证用

permissions:
  contents: write

concurrency:
  group: sync-yuque
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Elog
        run: npm install -g @elog/cli

      - name: Sync from Yuque
        env:
          YUQUE_USERNAME: ${{ secrets.YUQUE_USERNAME }}
          YUQUE_PASSWORD: ${{ secrets.YUQUE_PASSWORD }}
        run: elog sync

      - name: Build README index
        run: node tools/build-readme.cjs

      - name: Commit & Push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "docs: sync from yuque ($(date -u +%FT%TZ))"
            git push
          fi
